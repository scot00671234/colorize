# Nixpacks config for VPS / Railway / Render / Dokploy etc.
# Single process: serves API + built frontend (set NODE_ENV=production).
# Do not override nixPkgs with nodejs-20_x — the Nixpkgs revision Nixpacks uses may not have that attribute; use NIXPACKS_NODE_VERSION instead.

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"

[variables]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "20"
